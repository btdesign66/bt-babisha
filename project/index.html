<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Virtual Try-On</title>
    <meta name="description" content="Upload your photo and a dress image. Generate a realistic virtual try-on with Google Gemini." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="container">
        <header class="header">
          <h1>AI Virtual Try-On</h1>
          <p>Upload your photo and the dress, then click <b>Try On</b>.</p>
        </header>

        <div class="card">
          <form id="tryOnForm">
            <div class="grid">
              <div class="field">
                <label for="userImage">Your Photo</label>
                <input id="userImage" name="userImage" type="file" accept="image/*" required />
                <div class="preview">
                  <img id="userPreview" alt="User preview" />
                  <span id="userPreviewHint">Preview will appear here</span>
                </div>
              </div>

              <div class="field">
                <label for="dressImage">Dress Image</label>
                <input id="dressImage" name="dressImage" type="file" accept="image/*" required />
                <div class="preview">
                  <img id="dressPreview" alt="Dress preview" />
                  <span id="dressPreviewHint">Preview will appear here</span>
                </div>
              </div>
            </div>

            <div class="actions">
              <button id="tryOnBtn" type="submit">Try On</button>
              <button id="retryBtn" type="button" class="secondary" disabled>Retry</button>
            </div>

            <div id="loading" class="loading" aria-live="polite" style="display: none;">
              <div class="spinner"></div>
              <div class="loading-text">Generating try-on…</div>
            </div>

            <div id="error" class="error" style="display: none;"></div>
          </form>

          <section class="result">
            <h2>Result</h2>
            <div class="result-box">
              <img id="resultImage" alt="Generated try-on" style="display: none;" />
              <div id="resultPlaceholder" class="placeholder">
                Your generated output will appear here.
              </div>
            </div>
          </section>
        </div>

        <footer class="footer">
          <small>Tip: Use a clear front-facing photo with good lighting for best results.</small>
        </footer>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
